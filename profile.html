<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Hồ Sơ Của Tôi | VN GAME STORE</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/profile.css" />
  </head>
  <body>
    <header id="header-container"></header>

    <main class="profile-container container">
      <div class="profile-card">
        <div class="profile-sidebar">
          <div class="avatar-box">
            <img
              src="https://ui-avatars.com/api/?name=User&background=6f42c1&color=fff&size=128"
              id="user-avatar"
              alt="Avatar"
            />
          </div>
          <h2 id="profile-username">Username</h2>
          <p id="profile-email">email@example.com</p>
          <hr />
          <button class="btn-change-avatar" onclick="changeAvatar()">
            <i class="fas fa-camera"></i> Đổi ảnh đại diện
          </button>
        </div>

        <div class="profile-main">
          <h3>Thống kê tài khoản</h3>
          <div class="stats-grid">
            <div class="stat-item">
              <i class="fas fa-gamepad"></i>
              <div class="stat-info">
                <span class="stat-value" id="stat-games">0</span>
                <span class="stat-label">Game sở hữu</span>
              </div>
            </div>
            <div class="stat-item">
              <i class="fas fa-wallet"></i>
              <div class="stat-info">
                <span class="stat-value" id="stat-spent">0 đ</span>
                <span class="stat-label">Tổng chi tiêu</span>
              </div>
            </div>
          </div>

          <h3 style="margin-top: 30px">Thông tin chi tiết</h3>
          <form id="profile-form">
            <div class="form-group">
              <label>Tên hiển thị</label>
              <input type="text" id="display-name" placeholder="Chưa đặt tên" />
            </div>
            <div class="form-group">
              <label>Email tài khoản</label>
              <input
                type="text"
                id="profile-input-email"
                placeholder="Email tài khoản"
                disabled
              />
            </div>
            <div class="form-group">
              <label>Ngày tham gia</label>
              <input
                type="text"
                id="join-date"
                placeholder="Ngày tham gia"
                disabled
              />
            </div>
            <button type="button" class="btn-save" onclick="saveProfile()">
              Lưu thay đổi
            </button>
          </form>
        </div>
      </div>
    </main>

    <div id="toast-container"></div>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script src="js/profile.js"></script>
  </body>
</html>
